  <script src="decorations.js"></script>

  <script src="nav.js"></script>
  <script>
    (function () {
      var btn = document.getElementById("discord-copy");
      var meta = document.getElementById("discord-meta");
      if (btn && meta) {
        var username = "water.pump";
        var defaultText = username + " · tap to copy";

        btn.addEventListener("click", function () {
          navigator.clipboard.writeText(username).then(function () {
            meta.textContent = "Copied!";
            setTimeout(function () {
              meta.textContent = defaultText;
            }, 1800);
          }).catch(function () {});
        });
      }

      var shadow = document.getElementById("scroll-shadow");
      if (!shadow) return;

      function updateShadow() {
        var y = window.scrollY;
        var start = 40;
        var end = 220;
        var opacity = Math.min(Math.max((y - start) / (end - start), 0), 1);
        shadow.style.opacity = String(opacity);
      }

      window.addEventListener("scroll", updateShadow, { passive: true });
      updateShadow();
    })();
  </script>
