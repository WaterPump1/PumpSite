<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light">
  <meta name="theme-color" content="#fffce8">

  <title>Dylan Gaetano Combatti — Links</title>
  <meta name="description" content="Dylan Gaetano Combatti — socials and contact.">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300..1000;1,9..40,300..1000&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <nav class="site-nav" aria-label="Main navigation">
    <a href="#top" class="site-nav-link">Main page</a>
    <a href="gallery.html" class="site-nav-link">Gallery</a>
    <a href="#contact" class="site-nav-link">Contact</a>
  </nav>

  <div class="page-frame" aria-hidden="true">
    <span class="frame-corner frame-tl"></span>
    <span class="frame-corner frame-tr"></span>
    <span class="frame-corner frame-bl"></span>
    <span class="frame-corner frame-br"></span>
    <span class="frame-edge frame-top"></span>
    <span class="frame-edge frame-bottom"></span>
    <span class="frame-edge frame-left"></span>
    <span class="frame-edge frame-right"></span>
    <span class="frame-gem frame-gem-top"></span>
    <span class="frame-gem frame-gem-bottom"></span>
    <span class="frame-gem frame-gem-left"></span>
    <span class="frame-gem frame-gem-right"></span>
  </div>

  <div class="scroll-shadow" id="scroll-shadow" aria-hidden="true"></div>

  <main>
    <header class="hero" id="top">
      <h1 class="name name-headline">
        <span class="name-words">
          <span class="name-word">Dylan</span><span class="name-word">Gaetano</span><span class="name-word">Combatti</span>
        </span>
      </h1>
      <p class="tagline">Main page · Gallery · Contact</p>
      <p class="scroll-hint">Scroll down</p>
    </header>

    <div class="links-panel">
      <section id="socials" aria-labelledby="socials-heading">
        <h2 id="socials-heading">Links</h2>
        <ul>
          <li>
            <a class="card-link" href="https://www.facebook.com/dylan.combatti/" target="_blank" rel="noopener noreferrer">
              <span class="link-label">Facebook</span>
              <span class="link-meta">dylan.combatti <span class="arrow">→</span></span>
            </a>
          </li>
          <li>
            <a class="card-link" href="https://www.instagram.com/dylan._.cbt/" target="_blank" rel="noopener noreferrer">
              <span class="link-label">Instagram</span>
              <span class="link-meta">@dylan._.cbt <span class="arrow">→</span></span>
            </a>
          </li>
        </ul>
      </section>

      <section id="contact" aria-labelledby="contact-heading">
        <h2 id="contact-heading">Contact</h2>
        <ul>
          <li>
            <a class="card-link" data-email-compose href="#">
              <span class="link-label">Email</span>
              <span class="link-meta">Kelownaphotograph@gmail.com <span class="arrow">→</span></span>
            </a>
          </li>
          <li>
            <button type="button" id="discord-copy" class="card-link" aria-label="Copy Discord username water.pump">
              <span class="link-label">Discord</span>
              <span class="link-meta" id="discord-meta">water.pump · tap to copy</span>
            </button>
          </li>
        </ul>
      </section>

      <div class="contact-cta">
        <a href="#" data-email-compose class="contact-btn">Send a message</a>
      </div>
    </div>
  </main>

  <script src="decorations.js"></script>
  <script src="email.js"></script>
  <script src="nav.js"></script>
  <script>
    (function () {
      var btn = document.getElementById("discord-copy");
      var meta = document.getElementById("discord-meta");
      if (btn && meta) {
        var username = "water.pump";
        var defaultText = username + " · tap to copy";

        btn.addEventListener("click", function () {
          navigator.clipboard.writeText(username).then(function () {
            meta.textContent = "Copied!";
            setTimeout(function () {
              meta.textContent = defaultText;
            }, 1800);
          }).catch(function () {});
        });
      }

      var shadow = document.getElementById("scroll-shadow");
      if (!shadow) return;

      function updateShadow() {
        var y = window.scrollY;
        var start = 40;
        var end = 220;
        var opacity = Math.min(Math.max((y - start) / (end - start), 0), 1);
        shadow.style.opacity = String(opacity);
      }

      window.addEventListener("scroll", updateShadow, { passive: true });
      updateShadow();
    })();
  </script>
</body>
</html>
