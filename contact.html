<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light">
  <meta name="theme-color" content="#fffce8">

  <title>Contact — Dylan Gaetano Combatti</title>
  <meta name="description" content="Get in touch with Dylan Gaetano Combatti.">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300..1000;1,9..40,300..1000&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <nav class="site-nav" aria-label="Main navigation">
    <a href="index.html" class="site-nav-link">Main page</a>
    <a href="gallery.html" class="site-nav-link">Gallery</a>
    <a href="index.html#contact" class="site-nav-link is-active">Contact</a>
  </nav>

  <div class="page-frame" aria-hidden="true">
    <span class="frame-corner frame-tl"></span>
    <span class="frame-corner frame-tr"></span>
    <span class="frame-corner frame-bl"></span>
    <span class="frame-corner frame-br"></span>
    <span class="frame-edge frame-top"></span>
    <span class="frame-edge frame-bottom"></span>
    <span class="frame-edge frame-left"></span>
    <span class="frame-edge frame-right"></span>
    <span class="frame-gem frame-gem-top"></span>
    <span class="frame-gem frame-gem-bottom"></span>
    <span class="frame-gem frame-gem-left"></span>
    <span class="frame-gem frame-gem-right"></span>
  </div>

  <main class="contact-page">
    <a href="index.html" class="back-link">← Back</a>

    <header class="contact-header">
      <h1>Contact</h1>
      <p>Opens Gmail in a new tab with my address filled in.</p>
    </header>

    <div class="contact-cta contact-cta--page">
      <a href="#" data-email-compose class="contact-btn">Send a message</a>
      <p class="contact-copy-hint">
        Not using Gmail?
        <button type="button" class="contact-copy-link" data-email-copy>
          Copy <span data-email-meta data-default="Kelownaphotograph@gmail.com">Kelownaphotograph@gmail.com</span>
        </button>
      </p>
    </div>
  </main>

  <script src="decorations.js"></script>
  <script src="email.js"></script>
</body>
</html>
