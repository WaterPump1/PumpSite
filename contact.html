<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light">
  <meta name="theme-color" content="#fffce8">

  <title>Contact — Dylan Gaetano Combatti</title>
  <meta name="description" content="Get in touch with Dylan Gaetano Combatti.">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300..1000;1,9..40,300..1000&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <nav class="site-nav" aria-label="Main navigation">
    <a href="index.html#socials" class="site-nav-link">Socials</a>
    <a href="gallery.html" class="site-nav-link">Gallery</a>
    <a href="index.html#contact" class="site-nav-link is-active">Contact</a>
  </nav>

  <div class="page-frame" aria-hidden="true">
    <span class="frame-corner frame-tl"></span>
    <span class="frame-corner frame-tr"></span>
    <span class="frame-corner frame-bl"></span>
    <span class="frame-corner frame-br"></span>
    <span class="frame-edge frame-top"></span>
    <span class="frame-edge frame-bottom"></span>
    <span class="frame-edge frame-left"></span>
    <span class="frame-edge frame-right"></span>
    <span class="frame-gem frame-gem-top"></span>
    <span class="frame-gem frame-gem-bottom"></span>
    <span class="frame-gem frame-gem-left"></span>
    <span class="frame-gem frame-gem-right"></span>
  </div>

  <main class="contact-page">
    <a href="index.html" class="back-link">← Back</a>

    <header class="contact-header">
      <h1>Contact</h1>
      <p>Send me a message and I’ll get back to you.</p>
    </header>

    <form id="contact-form" class="contact-form" novalidate>
      <label class="form-field">
        <span class="form-label">Your email</span>
        <input type="email" id="contact-email" name="email" required placeholder="you@example.com" autocomplete="email">
      </label>

      <label class="form-field">
        <span class="form-label">Message</span>
        <textarea id="contact-message" name="message" required rows="6" placeholder="Write your message here..."></textarea>
      </label>

      <button type="submit" class="contact-submit">Send message</button>
    </form>
  </main>

  <script>
    (function () {
      var form = document.getElementById("contact-form");
      var recipient = "hello@example.com";

      form.addEventListener("submit", function (e) {
        e.preventDefault();

        var email = document.getElementById("contact-email").value.trim();
        var message = document.getElementById("contact-message").value.trim();

        if (!email || !message) return;

        var subject = encodeURIComponent("Message from " + email);
        var body = encodeURIComponent("From: " + email + "\n\n" + message);
        window.location.href = "mailto:" + recipient + "?subject=" + subject + "&body=" + body;
      });
    })();
  </script>
</body>
</html>
